---
apiVersion: v1
kind: ConfigMap
metadata:
  name: phoenix-prometheus-config
  namespace: mesh-system
data:
  prometheus.yml: |
    global:
      scrape_interval: 10s
      evaluation_interval: 10s

    scrape_configs:
      # Automatically discover and scrape Phoenix Sidecars
      - job_name: 'phoenix-mesh-sidecars'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          # Only target pods that have a container named 'sidecar-agent'
          - source_labels: [__meta_kubernetes_pod_container_name]
            action: keep
            regex: sidecar-agent
          # Map the Pod IP to the sidecar's metrics port (9090)
          - source_labels: [__meta_kubernetes_pod_ip]
            target_label: __address__
            replacement: '$1:9090'
          # Extract clean labels for our RCA Engine queries
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: service
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace

      # Monitor the Brain (Mesh Controller)
      - job_name: 'phoenix-controller'
        static_configs:
          - targets: ['phoenix-mesh-controller.mesh-system.svc.cluster.local:8080']

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: phoenix-prometheus
  namespace: mesh-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: phoenix-prometheus
  template:
    metadata:
      labels:
        app: phoenix-prometheus
    spec:
      serviceAccountName: phoenix-mesh-controller # Reuse for SD permissions
      containers:
        - name: prometheus
          image: prom/prometheus:v2.48.0
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--storage.tsdb.retention.time=7d"
            - "--web.enable-lifecycle"
          ports:
            - containerPort: 9090
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: storage
              mountPath: /prometheus
      volumes:
        - name: config
          configMap:
            name: phoenix-prometheus-config
        - name: storage
          emptyDir: {} # For production, swap to a PersistentVolumeClaim
---
apiVersion: v1
kind: Service
metadata:
  name: phoenix-prometheus
  namespace: mesh-system
spec:
  selector:
    app: phoenix-prometheus
  ports:
    - port: 9090
      targetPort: 9090
