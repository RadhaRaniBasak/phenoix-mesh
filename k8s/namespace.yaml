---
apiVersion: v1
kind: Namespace
metadata:
  name: phoenix-mesh
  labels:
    name: phoenix-mesh
    app: phoenix-mesh
  annotations:
    description: "Phoenix Mesh - Self-healing microservice mesh"
    documentation: "https://github.com/RadhaRaniBasak/phoenix-mesh"
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-phoenix-mesh
  namespace: phoenix-mesh
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: phoenix-mesh
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 9090
        - protocol: TCP
          port: 9101
        - protocol: TCP
          port: 9102
        - protocol: TCP
          port: 11434
        - protocol: TCP
          port: 9091
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 53  # DNS
        - protocol: UDP
          port: 53  # DNS
    - to:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 9090
        - protocol: TCP
          port: 9101
        - protocol: TCP
          port: 9102
        - protocol: TCP
          port: 11434
        - protocol: TCP
          port: 9091
        - protocol: TCP
          port: 3000
