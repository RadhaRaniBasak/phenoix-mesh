---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: phoenix-controller
  namespace: phoenix-mesh
  labels:
    app: phoenix-mesh
    component: controller

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: phoenix-controller
  labels:
    app: phoenix-mesh
    component: controller
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "deployments/status"]
    verbs: ["get", "list", "watch", "patch", "update"]
  
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["get", "list", "watch"]
  
  - apiGroups: [""]
    resources: ["pods", "pods/status", "pods/log"]
    verbs: ["get", "list", "watch", "patch", "create"]
  
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "patch", "update"]
  
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: phoenix-controller
  labels:
    app: phoenix-mesh
    component: controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: phoenix-controller
subjects:
  - kind: ServiceAccount
    name: phoenix-controller
    namespace: phoenix-mesh

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: phoenix-services
  namespace: phoenix-mesh
  labels:
    app: phoenix-mesh
    component: services
