---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: phoenix-order-service
  namespace: mesh-system
  labels:
    app: order-service
    app.kubernetes.io/part-of: phoenix-mesh
spec:
  replicas: 3
  revisionHistoryLimit: 20
  selector:
    matchLabels:
      app: order-service
      mesh.health: healthy
  template:
    metadata:
      labels:
        app: order-service
        mesh.health: healthy
    spec:
      # Ensures the controller can properly identify this ServiceAccount
      serviceAccountName: phoenix-mesh-controller 
      terminationGracePeriodSeconds: 30
      
      containers:
        - name: order-service
          image: your-registry.io/phoenix-order-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: SERVICE_NAME
              value: "order-service"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
              
        - name: sidecar-agent
          image: your-registry.io/phoenix-sidecar:latest
          imagePullPolicy: Always
          ports:
            - name: metrics
              containerPort: 9090
          env:
            - name: SERVICE_URL
              value: "http://localhost:3000"
            - name: CONTROLLER_URL
              value: "http://phoenix-mesh-controller.mesh-system.svc.cluster.local:8080"
          
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
