name: CI - Phoenix Mesh Build & Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker images
        run: docker compose build
      
      - name: Start services
        run: docker compose up -d
      
      - name: Wait for services to be healthy
        run: |
          for i in {1..30}; do
            if docker compose ps | grep -q "healthy"; then
              echo "Services are healthy"
              exit 0
            fi
            echo "Waiting for services... ($i/30)"
            sleep 2
          done
          echo "Services failed to become healthy"
          docker compose logs
          exit 1
      
      - name: Run health checks
        run: |
          echo "Checking phoenix-controller health..."
          curl -f http://localhost:8080/health || exit 1
          
          echo "Checking order-sidecar health..."
          curl -f http://localhost:9101/status || exit 1
          
          echo "Checking payment-sidecar health..."
          curl -f http://localhost:9102/status || exit 1
      
      - name: Cleanup
        if: always()
        run: docker compose down
