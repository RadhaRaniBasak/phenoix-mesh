name: CI - Phoenix Mesh Build & Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker images (with CI override)
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml build

      - name: Start services (with CI override)
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d

      - name: Wait for phoenix-controller to be healthy (diagnostics on failure)
        run: |
          set -euo pipefail

          echo "--- docker compose ps (initial) ---"
          docker compose -f docker-compose.yml -f docker-compose.ci.yml ps || true

          for i in {1..60}; do
            STATUS="$(docker inspect -f '{{.State.Health.Status}}' phoenix-controller 2>/dev/null || echo missing)"
            echo "phoenix-controller health: ${STATUS} ($i/60)"

            if [ "${STATUS}" = "healthy" ]; then
              echo "phoenix-controller is healthy"
              exit 0
            fi

            if [ "${STATUS}" = "unhealthy" ]; then
              echo "phoenix-controller is unhealthy"
              break
            fi

            sleep 2
          done

          echo "Services failed to become healthy"
          echo "--- docker compose ps ---"
          docker compose -f docker-compose.yml -f docker-compose.ci.yml ps || true

          echo "--- phoenix-controller logs ---"
          docker compose -f docker-compose.yml -f docker-compose.ci.yml logs --no-color --tail=300 phoenix-controller || true

          echo "--- full docker compose logs ---"
          docker compose -f docker-compose.yml -f docker-compose.ci.yml logs --no-color || true

          exit 1

      - name: Run health checks
        run: |
          echo "Checking phoenix-controller health..."
          curl -f http://localhost:8080/health || exit 1

          echo "Checking order-sidecar health..."
          curl -f http://localhost:9101/status || exit 1

          echo "Checking payment-sidecar health..."
          curl -f http://localhost:9102/status || exit 1

          echo "All health checks passed!"

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml down
